{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Well | NexusOil{% endblock %}
{% block page_title %}{% if editing %}Edit Well{% else %}New Well{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Well Id</label>
        <input type="text" name="well_id" value="{{ record.well_id|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Location</label>
        <input type="text" name="location" value="{{ record.location|default:'' }}">
      </div>
      <div class="form-group">
        <label>Well Type</label>
        <select name="well_type">
          <option value="production" {% if record.well_type == 'production' %}selected{% endif %}>Production</option>
          <option value="injection" {% if record.well_type == 'injection' %}selected{% endif %}>Injection</option>
          <option value="exploration" {% if record.well_type == 'exploration' %}selected{% endif %}>Exploration</option>
          <option value="observation" {% if record.well_type == 'observation' %}selected{% endif %}>Observation</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Depth M</label>
        <input type="number" step="0.01" name="depth_m" value="{{ record.depth_m|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="active" {% if record.status == 'active' %}selected{% endif %}>Active</option>
          <option value="shut_in" {% if record.status == 'shut_in' %}selected{% endif %}>Shut In</option>
          <option value="abandoned" {% if record.status == 'abandoned' %}selected{% endif %}>Abandoned</option>
          <option value="drilling" {% if record.status == 'drilling' %}selected{% endif %}>Drilling</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Daily Output</label>
        <input type="number" step="0.01" name="daily_output" value="{{ record.daily_output|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Spud Date</label>
        <input type="date" name="spud_date" value="{{ record.spud_date|date:'Y-m-d'|default:'' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Well</button>
      <a href="/wells/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
