{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} OGEquipment | NexusOil{% endblock %}
{% block page_title %}{% if editing %}Edit OGEquipment{% else %}New OGEquipment{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Equipment Type</label>
        <select name="equipment_type">
          <option value="pump" {% if record.equipment_type == 'pump' %}selected{% endif %}>Pump</option>
          <option value="compressor" {% if record.equipment_type == 'compressor' %}selected{% endif %}>Compressor</option>
          <option value="separator" {% if record.equipment_type == 'separator' %}selected{% endif %}>Separator</option>
          <option value="generator" {% if record.equipment_type == 'generator' %}selected{% endif %}>Generator</option>
          <option value="valve" {% if record.equipment_type == 'valve' %}selected{% endif %}>Valve</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Serial Number</label>
        <input type="text" name="serial_number" value="{{ record.serial_number|default:'' }}">
      </div>
      <div class="form-group">
        <label>Well Name</label>
        <input type="text" name="well_name" value="{{ record.well_name|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="operational" {% if record.status == 'operational' %}selected{% endif %}>Operational</option>
          <option value="maintenance" {% if record.status == 'maintenance' %}selected{% endif %}>Maintenance</option>
          <option value="failed" {% if record.status == 'failed' %}selected{% endif %}>Failed</option>
        </select>
      </div>
      <div class="form-group">
        <label>Last Service</label>
        <input type="date" name="last_service" value="{{ record.last_service|date:'Y-m-d'|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Next Service</label>
        <input type="date" name="next_service" value="{{ record.next_service|date:'Y-m-d'|default:'' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} OGEquipment</button>
      <a href="/ogequipments/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
